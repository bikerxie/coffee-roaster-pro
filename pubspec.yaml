name: coffee_roaster
version: 1.0.0+1
publish_to: none
description: A professional coffee roasting control app

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  fl_chart: ^0.66.0
  google_fonts: ^6.1.0
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Bluetooth
  flutter_blue_plus: ^1.31.15
  
  # Database
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.2.1
  share_plus: ^7.2.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/